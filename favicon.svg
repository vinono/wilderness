<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" fill="none">
  <defs>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#f43f5e" />
    </linearGradient>
    <filter id="glowBlur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- 外围极光呼吸环 -->
  <circle cx="32" cy="32" r="26" stroke="url(#glowGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.35" />
  <circle cx="32" cy="32" r="19" stroke="url(#glowGrad)" stroke-width="1.8" stroke-linecap="round" opacity="0.65" />
  
  <!-- 内层虚线专注环 -->
  <circle cx="32" cy="32" r="12" stroke="url(#glowGrad)" stroke-width="1.2" stroke-dasharray="4 2.5" opacity="0.85" />
  
  <!-- 核心四角专注星芒 -->
  <path d="M32 20.5 L34.8 29.2 L43.5 32 L34.8 34.8 L32 43.5 L29.2 34.8 L20.5 32 L29.2 29.2 Z" fill="url(#glowGrad)" filter="url(#glowBlur)" />
</svg>