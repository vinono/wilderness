<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>空腹洞窟 ｜ 异兽魔都 Wiki 🥟</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
  
  <!-- CDN Scripts -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    /* DESIGN TOKENS */
    :root {
      --primary: #19c8b9;
      --primary-hover: #3dd4c6;
      --primary-active: #11a89b;
      --primary-bg: #e6f9f6;

      --text: #794f27;
      --text-body: #725d42;
      --text-secondary: #9f927d;
      --text-muted: #8a7b66;
      --text-disabled: #c4b89e;

      --bg: #f8f8f0;
      --bg-content: rgb(247, 243, 223);
      --bg-disabled: #f0ece2;

      --border: #c4b89e;
      --border-hover: #a89878;
      --border-strong: #9f927d;

      --success: #6fba2c;
      --success-active: #5a9e1e;
      --warning: #f5c31c;
      --warning-active: #dba90e;
      --error: #e05a5a;
      --error-active: #c94444;

      --focus-yellow: #ffcc00;
      --focus-yellow-d: #e0b800;
      --focus-yellow-radio: #f5c31c;

      --shadow-btn: #bdaea0;
      --shadow-input: #d4c9b4;
      --shadow-switch: #5a9e1e;

      --r-sm: 12px;
      --r-base: 18px;
      --r-lg: 24px;
      --r-pill: 50px;

      --ease: cubic-bezier(0.4, 0, 0.2, 1);
      --d-fast: 0.15s;
      --d-base: 0.25s;
      --d-slow: 0.35s;
    }

    /* GLOBAL STYLES */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: Nunito, 'Noto Sans SC', -apple-system, 'PingFang SC', sans-serif;
      font-weight: 500;
      background-color: var(--bg);
      color: var(--text-body);
      letter-spacing: 0.01em;
      min-height: 100vh;
      overflow-x: hidden;
      /* 动森经典草地背景微花纹 */
      background-image: radial-gradient(#e1dec9 1px, transparent 1px);
      background-size: 24px 24px;
    }

    /* CURSOR OVERRIDE */
    .animal-cursor, .animal-cursor * {
      cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' viewBox='0 0 32 32'><path d='M8 2 C10 2, 12 4, 12 7 C12 9, 10 11, 8 11 C6 11, 4 9, 4 7 C4 4, 6 2, 8 2 M20 2 C22 2, 24 4, 24 7 C24 9, 22 11, 20 11 C18 11, 16 9, 16 7 C16 4, 18 2, 20 2 M14 10 C16 10, 18 12, 18 15 C18 17, 16 19, 14 19 C12 19, 10 17, 10 15 C10 12, 12 10, 14 10 M8 22 C14 22, 20 24, 20 27 C20 29, 16 30, 14 30 C10 30, 8 29, 8 27 C8 24, 8 22, 8 22' fill='%23794f27' stroke='%23fff' stroke-width='2'/></svg>") 4 0, auto !important;
    }

    /* COMPONENT STYLES */
    
    /* Button */
    .ani-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: inherit;
      font-weight: 700;
      letter-spacing: 0.02em;
      border: 2px solid transparent;
      outline: none;
      transition: all var(--d-fast) var(--ease);
      user-select: none;
    }
    
    .ani-btn:not(:disabled) {
      cursor: pointer;
    }

    /* Button Sizes */
    .ani-btn-small {
      height: 32px;
      padding: 0 16px;
      font-size: 12px;
      border-radius: 16px;
    }
    .ani-btn-middle {
      height: 45px;
      padding: 0 20px;
      font-size: 14px;
      border-radius: 50px;
    }
    .ani-btn-large {
      height: 48px;
      padding: 0 32px;
      font-size: 16px;
      border-radius: 24px;
    }

    /* Button Types */
    .ani-btn-primary {
      color: #794f27;
      background: #f8f8f0;
      border-color: #f8f8f0;
      box-shadow: 0 5px 0 0 var(--shadow-btn);
    }
    .ani-btn-primary:hover:not(:disabled) {
      box-shadow: 0 6px 0 0 var(--shadow-btn);
      transform: translateY(-1px);
    }
    .ani-btn-primary:active:not(:disabled) {
      box-shadow: 0 1px 0 0 var(--shadow-btn);
      transform: translateY(2px);
    }

    .ani-btn-danger {
      color: #fff;
      background: #e05a5a;
      border-color: #e05a5a;
      box-shadow: 0 5px 0 0 #c94444;
    }
    .ani-btn-danger:hover:not(:disabled) {
      box-shadow: 0 6px 0 0 #c94444;
      transform: translateY(-1px);
    }
    .ani-btn-danger:active:not(:disabled) {
      box-shadow: 0 1px 0 0 #c94444;
      transform: translateY(2px);
    }

    .ani-btn-default {
      background: #f8f8f0;
      border-color: #9f927d;
      color: var(--text-body);
      box-shadow: 0 2px 4px 0 rgba(61,52,40,0.06);
    }
    .ani-btn-default:hover:not(:disabled) {
      color: var(--primary);
      border-color: var(--primary);
      box-shadow: 0 3px 10px 0 rgba(61,52,40,0.10);
      transform: translateY(-1px);
    }
    .ani-btn-default:active:not(:disabled) {
      color: var(--primary-active);
      border-color: var(--primary-active);
      transform: translateY(0);
      box-shadow: 0 2px 4px 0 rgba(61,52,40,0.06);
    }

    .ani-btn-dashed {
      background: #f8f8f0;
      border: 2px dashed #9f927d;
      color: var(--text-body);
      box-shadow: 0 2px 4px 0 rgba(61,52,40,0.06);
    }
    .ani-btn-dashed:hover:not(:disabled) {
      color: var(--primary);
      border-color: var(--primary);
      box-shadow: 0 3px 10px 0 rgba(61,52,40,0.10);
      transform: translateY(-1px);
    }

    .ani-btn-text, .ani-btn-link {
      background: transparent;
      border-color: transparent;
      color: var(--text-body);
    }
    .ani-btn-link {
      color: var(--primary);
      text-decoration: underline;
    }
    .ani-btn-text:hover:not(:disabled), .ani-btn-link:hover:not(:disabled) {
      color: var(--primary-hover);
      transform: translateY(-1px);
    }

    /* Button Loading State */
    .ani-btn-loading {
      background: #0ec4b6 !important;
      background-image: repeating-linear-gradient(-45deg, #0ec4b6 0 10px, #01b0a7 10px 20px) !important;
      background-size: 28.28px 28.28px !important;
      border: 4px solid #4de2da !important;
      color: #fff !important;
      box-shadow: none !important;
      animation: btn-loading 1s linear infinite;
      pointer-events: none;
    }
    @keyframes btn-loading {
      to { background-position: -28.28px 0; }
    }

    .ani-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      box-shadow: none !important;
      transform: none !important;
    }

    .ani-btn-block {
      display: flex;
      width: 100%;
    }

    /* Input */
    .ani-input-wrapper {
      display: inline-flex;
      align-items: center;
      background: rgb(247, 243, 223);
      border: 2px solid var(--border);
      color: var(--text-body);
      font-weight: 500;
      letter-spacing: 0.01em;
      transition: all var(--d-fast) var(--ease);
      width: 100%;
    }
    
    .ani-input-wrapper:hover:not(.disabled) {
      border-color: var(--border-hover);
    }
    
    .ani-input-wrapper.shadow-active {
      box-shadow: 0 3px 0 0 var(--shadow-input);
    }
    .ani-input-wrapper.shadow-active:hover:not(.disabled) {
      box-shadow: 0 3px 0 0 var(--border);
    }

    .ani-input-wrapper.focus {
      border-color: var(--focus-yellow);
      box-shadow: 0 0 0 3px rgba(255,204,0,0.15) !important;
    }
    .ani-input-wrapper.focus.shadow-active {
      box-shadow: 0 3px 0 0 var(--focus-yellow-d), 0 0 0 3px rgba(255,204,0,0.15) !important;
    }

    /* Input error/warning states */
    .ani-input-wrapper.error {
      border-color: var(--error);
      box-shadow: 0 3px 0 0 var(--error-active) !important;
    }
    .ani-input-wrapper.warning {
      border-color: var(--warning);
      box-shadow: 0 3px 0 0 var(--warning-active) !important;
    }

    .ani-input {
      border: none;
      background: transparent;
      outline: none;
      width: 100%;
      height: 100%;
      color: inherit;
      font-family: inherit;
      font-size: inherit;
      font-weight: inherit;
    }
    .ani-input::placeholder {
      color: var(--text-disabled);
      font-weight: 400;
    }
    
    .ani-input-small {
      height: 28px;
      padding: 0 14px;
      font-size: 12px;
      border-radius: 40px;
    }
    .ani-input-middle {
      height: 36px;
      padding: 0 18px;
      font-size: 14px;
      border-radius: 50px;
    }
    .ani-input-large {
      height: 44px;
      padding: 0 22px;
      font-size: 16px;
      border-radius: 50px;
    }

    .ani-input-wrapper.disabled {
      background: var(--bg-disabled);
      color: var(--text-disabled);
      border-color: var(--shadow-input);
      opacity: 0.6;
      box-shadow: none !important;
    }

    /* Switch */
    .ani-switch {
      position: relative;
      display: inline-flex;
      align-items: center;
      width: 52px;
      height: 28px;
      background-color: var(--border-hover);
      border: 2.5px solid var(--border);
      border-radius: 50px;
      box-shadow: inset 0 2px 4px rgba(114,93,66,0.15);
      cursor: pointer;
      user-select: none;
      transition: all var(--d-base) var(--ease);
      outline: none;
    }
    .ani-switch:hover {
      border-color: var(--border-hover);
    }
    .ani-switch-handle {
      position: absolute;
      left: 2px;
      top: 50%;
      transform: translateY(-50%);
      width: 21px;
      height: 21px;
      background: rgb(247,243,223);
      border: 2.5px solid var(--border);
      border-radius: 50%;
      transition: all var(--d-base) var(--ease);
    }
    .ani-switch-checked {
      background-color: #86d67a;
      border-color: #6fba2c;
      box-shadow: inset 0 2px 4px rgba(90,158,30,0.20);
    }
    .ani-switch-checked .ani-switch-handle {
      left: calc(100% - 24px);
      border-color: #6fba2c;
    }
    .ani-switch-checked:hover {
      background-color: #7ccc70;
      border-color: #5a9e1e;
    }
    .ani-switch-checked:hover .ani-switch-handle {
      border-color: #5a9e1e;
    }

    /* Switch small */
    .ani-switch-small {
      width: 38px;
      height: 20px;
    }
    .ani-switch-small .ani-switch-handle {
      width: 14px;
      height: 14px;
      left: 1px;
    }
    .ani-switch-small.ani-switch-checked .ani-switch-handle {
      left: calc(100% - 16px);
    }

    .ani-switch:focus-visible {
      outline: 2px solid var(--focus-yellow);
      outline-offset: 2px;
    }
    .ani-switch.disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Card */
    .ani-card {
      position: relative;
      background: rgb(247, 243, 223);
      border-radius: 20px;
      padding: 16px 24px;
      color: var(--text-body);
      transition: transform var(--d-base) var(--ease), border-color var(--d-base) var(--ease);
      border: 1.5px solid transparent;
    }
    .ani-card-hoverable:hover {
      transform: translateY(-2px);
      cursor: pointer;
    }
    
    .ani-card-dashed {
      background: rgb(250,248,242);
      border: 2px dashed #e8dcc8;
    }
    .ani-card-dashed:hover {
      border-color: #d4c4a8;
      transform: none;
    }

    /* Card Patterns (Wallpaper look) */
    .ani-card-pattern-default {
      background: radial-gradient(circle, rgba(121,79,39,0.08) 1.5px, transparent 1.5px) 0 0/24px 24px, #fdfbf7;
      border-color: var(--border);
      color: var(--text-body);
    }
    .ani-card-pattern-app-pink {
      background: radial-gradient(circle, rgba(248, 166, 178, 0.18) 1.5px, transparent 1.5px) 0 0/28px 28px,
                  radial-gradient(circle, rgba(255, 200, 210, 0.12) 1px, transparent 1px) 7px 7px/14px 14px, #fde4e8;
      border-color: #f8a6b2;
      color: #a85565;
    }
    .ani-card-pattern-purple {
      background: radial-gradient(circle, rgba(183, 125, 238, 0.18) 1.5px, transparent 1.5px) 0 0/28px 28px, #f5eefd;
      border-color: #b77dee;
      color: #6a3a9a;
    }
    .ani-card-pattern-app-blue {
      background: radial-gradient(circle, rgba(136, 157, 240, 0.18) 1.5px, transparent 1.5px) 0 0/28px 28px, #eff2fe;
      border-color: #889df0;
      color: #3b50c0;
    }
    .ani-card-pattern-app-yellow {
      background: radial-gradient(circle, rgba(247, 205, 103, 0.22) 1.5px, transparent 1.5px) 0 0/28px 28px, #fef7e6;
      border-color: #f7cd67;
      color: #725d42;
    }
    .ani-card-pattern-app-teal {
      background: radial-gradient(circle, rgba(130, 213, 187, 0.2) 1.5px, transparent 1.5px) 0 0/28px 28px, #edfbf7;
      border-color: #82d5bb;
      color: #1e604d;
    }
    .ani-card-pattern-app-green {
      background: radial-gradient(circle, rgba(138, 198, 138, 0.2) 1.5px, transparent 1.5px) 0 0/28px 28px, #eff8ef;
      border-color: #8ac68a;
      color: #2e5a2e;
    }
    .ani-card-pattern-app-orange {
      background: radial-gradient(circle, rgba(229, 146, 102, 0.18) 1.5px, transparent 1.5px) 0 0/28px 28px, #fdf1ea;
      border-color: #e59266;
      color: #8a3c18;
    }
    .ani-card-pattern-app-red {
      background: radial-gradient(circle, rgba(252, 115, 109, 0.18) 1.5px, transparent 1.5px) 0 0/28px 28px, #fff0ef;
      border-color: #fc736d;
      color: #9c2e28;
    }

    /* Title Ribbon */
    .ani-title-wrapper {
      display: inline-flex;
      position: relative;
      height: 2em;
      padding: 0 1.6em;
      font-weight: 800;
      line-height: 1;
      letter-spacing: 0.04em;
      filter: drop-shadow(0 0.08em 0.12em rgba(0,0,0,0.05));
      align-items: center;
      justify-content: center;
      margin: 1em 0;
    }
    
    .ani-title-text {
      font-weight: 900;
      padding-top: 0.11em;
      z-index: 4;
      position: relative;
    }

    .ani-title-front {
      position: absolute;
      inset: 0 0.1em;
      border-radius: 0.2em;
      background: var(--rf, #27d039);
      color: var(--rt, #fff);
      transform: perspective(11.5em) rotateX(3deg);
      box-shadow: inset 0 -0.06em 0 rgba(0,0,0,0.15);
      z-index: 3;
    }

    .ani-title-back {
      position: absolute;
      z-index: 1;
      width: 1.2em;
      height: 100%;
      background: var(--rb, #20992a);
      top: 0.25em;
    }
    .ani-title-back-left {
      left: -0.6em;
      clip-path: polygon(100% 0%, 100% 100%, 0% 100%, 35% 50%, 0% 0%);
    }
    .ani-title-back-right {
      right: -0.6em;
      clip-path: polygon(0% 0%, 100% 0%, 65% 50%, 100% 100%, 0% 100%);
    }

    .ani-title-fold {
      position: absolute;
      z-index: 2;
      top: 100%;
      width: 0;
      height: 0;
      border-style: solid;
    }
    .ani-title-fold-left {
      left: 0.1em;
      border-width: 0 0.5em 0.28em 0;
      border-color: transparent var(--rk, #115017) transparent transparent;
    }
    .ani-title-fold-right {
      right: 0.1em;
      border-width: 0 0 0.28em 0.5em;
      border-color: transparent transparent transparent var(--rk, #115017);
    }

    /* Modal */
    .ani-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(40, 30, 20, 0.45);
      backdrop-filter: blur(2px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      animation: fadeIn var(--d-fast) var(--ease);
    }
    .ani-modal-container {
      clip-path: url(#animal-modal-clip);
      background: rgb(247, 243, 223);
      width: 90%;
      max-width: 480px;
      padding: 40px 40px 32px 40px;
      color: var(--text-body);
      border: 3px solid var(--border);
      animation: scaleUp var(--d-base) var(--ease);
    }
    @keyframes fadeIn { from { opacity: 0; } }
    @keyframes scaleUp { from { transform: scale(0.95); opacity: 0; } }

    .ani-modal-header {
      font-size: 20px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 16px;
      text-align: center;
    }
    .ani-modal-body {
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 24px;
      color: var(--text-body);
    }
    .ani-modal-footer {
      display: flex;
      justify-content: center;
      gap: 16px;
    }

    /* Tabs */
    .ani-tabs {
      background: rgb(247, 243, 223);
      border: 2px solid var(--border-strong);
      border-radius: 24px;
      overflow: hidden;
      width: 100%;
    }
    .ani-tabs-list {
      display: flex;
      padding: 12px 16px;
      gap: 8px;
      background: rgba(255,255,255,0.45);
      border-bottom: 2px solid var(--border);
      flex-wrap: wrap;
    }
    .ani-tabs-item {
      padding: 8px 18px;
      border-radius: 24px;
      color: var(--text-body);
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      user-select: none;
      transition: all var(--d-fast) var(--ease);
    }
    .ani-tabs-item:hover {
      background: rgba(25, 200, 185, 0.08);
    }
    .ani-tabs-item-active {
      background: #0cc0b5 !important;
      color: #fff9e3 !important;
      font-weight: 800;
    }
    .ani-tabs-content {
      padding: 24px;
    }

    /* Collapse */
    .ani-collapse {
      background: rgb(247, 243, 223);
      border: 2px solid var(--border-strong);
      border-radius: 18px;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .ani-collapse-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      cursor: pointer;
      user-select: none;
      font-weight: 700;
      font-size: 16px;
      transition: background-color var(--d-fast) var(--ease);
    }
    .ani-collapse-header:hover {
      background-color: rgba(25,200,185,0.05);
    }
    .ani-collapse-icon {
      width: 24px;
      height: 24px;
      background: var(--primary);
      color: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 16px;
      transition: transform var(--d-base) var(--ease);
      box-shadow: 0 2px 4px rgba(25,200,185,0.25);
    }
    .ani-collapse-content {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows var(--d-base) var(--ease);
    }
    .ani-collapse-content-open {
      grid-template-rows: 1fr;
    }
    .ani-collapse-inner {
      overflow: hidden;
    }
    .ani-collapse-body {
      padding: 20px 24px;
      border-top: 1.5px solid var(--border);
      line-height: 1.6;
      font-size: 14px;
    }

    /* Select */
    .ani-select-wrapper {
      position: relative;
      display: inline-block;
      width: 100%;
    }
    .ani-select-trigger {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #fff;
      border: 2px solid #e8dcc8;
      border-radius: 12px;
      padding: 8px 14px;
      color: var(--text-body);
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      user-select: none;
      transition: all var(--d-fast) var(--ease);
    }
    .ani-select-trigger:hover {
      border-color: #d4c4a8;
      background: #fffdf7;
    }
    .ani-select-dropdown {
      position: absolute;
      top: 110%;
      left: 0;
      width: 100%;
      background: #ffeea0;
      border-radius: 20px;
      padding: 8px 0;
      z-index: 100;
      box-shadow: 0 4px 12px rgba(121,79,39,0.15);
      border: 2px solid #e0b800;
      animation: fadeIn var(--d-fast) var(--ease);
    }
    .ani-select-option {
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-body);
      cursor: pointer;
      transition: background var(--d-fast) var(--ease);
    }
    .ani-select-option:hover {
      background: rgba(121,79,39,0.08);
      font-weight: 700;
    }
    .ani-select-option-selected {
      background: rgba(25, 200, 185, 0.15);
      font-weight: 700;
    }

    /* Checkbox & Radio */
    .ani-checkbox-container, .ani-radio-container {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
      font-weight: 500;
    }
    
    .ani-checkbox-box {
      width: 20px;
      height: 20px;
      background: rgb(247, 243, 223);
      border: 2.5px solid var(--border);
      border-radius: 6px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all var(--d-fast) var(--ease);
    }
    .ani-checkbox-container:hover .ani-checkbox-box {
      border-color: var(--primary);
      transform: translateY(-1px);
    }
    .ani-checkbox-checked .ani-checkbox-box {
      background: var(--primary);
      border-color: var(--primary-active);
    }
    .ani-checkbox-checkmark {
      color: #fff;
      font-size: 14px;
      font-weight: 900;
    }

    .ani-radio-box {
      width: 22px;
      height: 22px;
      background: rgb(247, 243, 223);
      border: 2px solid var(--border);
      border-radius: 8px; /* Heavily rounded square */
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all var(--d-fast) var(--ease);
    }
    .ani-radio-container:hover .ani-radio-box {
      border-color: var(--primary);
      transform: translateY(-1px);
    }
    .ani-radio-checked .ani-radio-box {
      background: var(--primary);
      border-color: var(--primary-active);
    }
    .ani-radio-checkmark {
      width: 12px;
      height: 12px;
      stroke: white;
      stroke-width: 2.5px;
      fill: none;
    }

    /* Wallet */
    .ani-wallet {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      padding-top: 28px;
    }
    .ani-wallet-pill {
      background: #b3a046;
      border-radius: 999px;
      padding: 4px 18px;
      font-weight: 800;
      color: #fff;
      font-variant-numeric: tabular-nums;
      box-shadow: inset 0 -4px 0 rgba(91,78,30,0.22),
                  inset 0 0 0 2px rgba(91,78,30,0.12),
                  0 0 0 4px #fffbe7,
                  0 4px 8px rgba(91,78,30,0.15);
      text-shadow: 0 1.5px 0 rgba(91,78,30,0.55), 0 0 1px rgba(91,78,30,0.55);
      letter-spacing: 0.04em;
      white-space: nowrap;
      z-index: 1;
    }
    .ani-wallet-bag {
      position: absolute;
      top: 0;
      width: 38px;
      height: 38px;
      z-index: 2;
      filter: drop-shadow(0 2px 4px rgba(91,78,30,0.18));
      transition: transform var(--d-base) var(--ease);
    }
    .ani-wallet:hover .ani-wallet-bag {
      transform: translateY(-4px) rotate(-5deg);
    }

    /* NookPhone Shell (Decorative widget) */
    .ani-phone {
      width: 100%;
      max-width: 320px;
      height: 520px;
      background: #eedcb6;
      border: 12px solid #5d4636;
      border-radius: 48px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      position: relative;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    }
    .ani-phone-screen {
      flex: 1;
      background: #fdfbf7;
      border-radius: 28px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      border: 3px solid #cbba97;
    }
    .ani-phone-top {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      font-weight: 800;
      color: #a89a7f;
      margin-bottom: 12px;
    }
    .ani-phone-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .ani-phone-app {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
    }
    .ani-phone-icon {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 24px;
      box-shadow: 0 3px 6px rgba(0,0,0,0.06);
      transition: transform var(--d-fast) var(--ease);
    }
    .ani-phone-app:hover .ani-phone-icon {
      transform: scale(1.05) rotate(-3deg);
    }
    .ani-phone-label {
      font-size: 11px;
      font-weight: 700;
      color: #725d42;
    }

    /* HUD Time Clock */
    .ani-time {
      display: inline-flex;
      align-items: center;
      background: linear-gradient(180deg, #fff 0%, #f8f8f0 100%);
      border: 2.5px solid #d4cfc3;
      border-radius: 16px;
      padding: 10px 20px;
      gap: 16px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.03);
    }
    .ani-time-date {
      border-right: 2px solid rgba(159,146,125,0.25);
      padding-right: 16px;
      text-align: right;
    }
    .ani-time-week {
      color: #6fba2c;
      font-weight: 900;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .ani-time-day {
      color: #8b7355;
      font-weight: 800;
      font-size: 16px;
    }
    .ani-time-clock {
      color: #8b7355;
      font-weight: 900;
      font-size: 28px;
      font-family: monospace;
    }

    /* Table */
    .ani-table-wrapper {
      background: rgb(247,243,223);
      border-radius: 20px;
      border: 2px solid var(--border);
      overflow: hidden;
      width: 100%;
    }
    .ani-table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }
    .ani-table th {
      background: rgba(255,255,255,0.4);
      padding: 14px 18px;
      font-weight: 800;
      font-size: 13px;
      color: var(--text);
      border-bottom: 2px dashed var(--border);
    }
    .ani-table td {
      padding: 12px 18px;
      font-size: 14px;
      color: var(--text-body);
      border-bottom: 1px dashed rgba(196,184,158,0.5);
    }
    .ani-table-striped tbody tr:nth-child(even) {
      background: rgba(248,248,240,0.45);
    }
    .ani-table tbody tr:hover {
      /* 动森经典斜向斑马条悬浮特效 */
      background: repeating-linear-gradient(-45deg, rgba(25,200,185,0.08) 0 10px, rgba(14,196,182,0.08) 10px 20px);
    }

    /* Tooltip */
    .ani-tooltip-container {
      position: relative;
      display: inline-block;
    }
    .ani-tooltip-box {
      visibility: hidden;
      position: absolute;
      bottom: 125%;
      left: 50%;
      transform: translateX(-50%);
      background: rgb(247, 243, 223);
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 6px 12px;
      color: var(--text-body);
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      z-index: 100;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      opacity: 0;
      transition: opacity var(--d-fast) var(--ease);
    }
    .ani-tooltip-box::after {
      content: "";
      position: absolute;
      top: 100%;
      left: 50%;
      margin-left: -6px;
      border-width: 6px;
      border-style: solid;
      border-color: var(--border) transparent transparent transparent;
    }
    .ani-tooltip-container:hover .ani-tooltip-box {
      visibility: visible;
      opacity: 1;
    }

    /* CodeBlock */
    .ani-codeblock {
      background: #2b2118;
      border: 2px solid #3d3028;
      border-radius: 16px;
      padding: 16px 20px;
      font-family: 'SF Mono', Consolas, Monaco, monospace;
      font-size: 13px;
      line-height: 1.6;
      color: #e8d5bc;
      overflow-x: auto;
      margin: 12px 0;
    }

    /* Form Layouts */
    .ani-form {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .ani-form-item {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .ani-form-item-horizontal {
      display: grid;
      grid-template-columns: repeat(24, 1fr);
      align-items: center;
      gap: 8px;
    }
    .ani-form-item-label {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-body);
    }
    .ani-form-item-horizontal .ani-form-item-label-col {
      grid-column: span 6;
      text-align: right;
      padding-right: 12px;
    }
    .ani-form-item-horizontal .ani-form-item-wrapper-col {
      grid-column: span 18;
    }
    .ani-form-item-required::before {
      content: "*";
      color: #ff4d4f;
      margin-right: 4px;
    }

    /* Divider */
    .ani-divider {
      height: 12px;
      margin: 24px 0;
      background-position: center;
      background-repeat: repeat-x;
      background-size: contain;
    }

    /* Footer decorations */
    .ani-footer-tree {
      height: 60px;
      width: 100%;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 40' width='120' height='40' fill='none'><path d='M10 35 L15 25 L12 25 L17 15 L14 15 L19 5 L24 15 L21 15 L26 25 L23 25 L28 35 Z M50 35 L53 28 L51 28 L55 20 L53 20 L57 12 L61 20 L59 20 L63 28 L61 28 L64 35 Z M90 35 L95 24 L92 24 L98 12 L95 12 L100 2 L105 12 L102 12 L108 24 L105 24 L110 35 Z' fill='%238ac68a'/><rect x='0' y='35' width='120' height='5' fill='%236fba2c'/></svg>");
      background-repeat: repeat-x;
      background-size: contain;
    }
    .ani-footer-sea {
      height: 60px;
      width: 100%;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 30' width='100' height='30' fill='none'><path d='M0 15 Q12.5 5 25 15 T50 15 T75 15 T100 15 L100 30 L0 30 Z' fill='%2398D2E3'/><path d='M0 20 Q12.5 12 25 20 T50 20 T75 20 T100 20 L100 30 L0 30 Z' fill='%23327A93'/></svg>");
      background-repeat: repeat-x;
      background-size: contain;
    }
  </style>
</head>
<body>

  <!-- SVG Clip Path Block for Modal -->
  <svg style="position:absolute;width:0;height:0" aria-hidden="true">
    <defs>
      <clipPath id="animal-modal-clip" clipPathUnits="objectBoundingBox">
        <path d="M0.501,0.005 L0.501,0.005 L0.523,0.005 L0.549,0.006 C0.704,0.01,0.796,0.017,0.825,0.027 L0.827,0.028 C0.872,0.045,0.939,0.044,0.978,0.17 C1,0.254,1,0.365,0.99,0.505 L0.988,0.513 C0.979,0.558,0.971,0.598,0.965,0.633 C0.956,0.689,0.979,0.77,0.964,0.865 C0.953,0.928,0.921,0.966,0.869,0.979 C0.821,0.986,0.773,0.992,0.726,0.995 L0.712,0.996 L0.694,0.997 C0.648,1,0.586,1,0.507,1 L0.501,1 L0.464,1 C0.385,1,0.325,0.998,0.283,0.995 C0.234,0.992,0.184,0.987,0.133,0.979 C0.081,0.966,0.05,0.928,0.039,0.865 C0.023,0.77,0.047,0.689,0.037,0.633 C0.031,0.595,0.023,0.552,0.013,0.505 C-0.006,0.365,-0.002,0.254,0.024,0.17 C0.064,0.045,0.13,0.045,0.174,0.028 L0.175,0.028 C0.204,0.017,0.303,0.009,0.474,0.005 L0.501,0.005" />
      </clipPath>
    </defs>
  </svg>

  <!-- Root mount target -->
  <div id="root" class="animal-cursor"></div>

  <!-- React Script -->
  <script type="text/babel" data-presets="react">
    /** @jsxRuntime classic */

    // ==========================================
    // 1) INLINE REACT COMPONENTS (animal-island-ui)
    // ==========================================

    const ICON_LIST = {
      leaf: <path d="M32 10 C38 10, 48 14, 48 24 C48 30, 40 38, 32 44 C24 38, 16 30, 16 24 C16 14, 26 10, 32 10 Z" fill="currentColor"/>,
      star: <path d="M32 8 L38 22 L52 24 L42 34 L45 48 L32 40 L19 48 L22 34 L12 24 L26 22 Z" fill="currentColor"/>,
      check: <path d="M12 28 L22 38 L48 12" stroke="currentColor" strokeWidth="6" strokeLinecap="round" strokeLinejoin="round" fill="none"/>,
      close: <path d="M14 14 L42 42 M42 14 L14 42" stroke="currentColor" strokeWidth="6" strokeLinecap="round" fill="none"/>,
      copy: <path d="M20 20 H44 V44 H20 Z M14 14 H38 V20 H14 Z" stroke="currentColor" strokeWidth="4" fill="none"/>,
      trash: <path d="M16 16 H44 V44 H16 Z M22 16 V10 H34 V16 M20 26 V36 M28 26 V36 M36 26 V36" stroke="currentColor" strokeWidth="4" fill="none"/>
    };

    function Icon({ name, size = 18, color = 'currentColor', ...rest }) {
      return (
        <svg viewBox="0 0 56 56" width={size} height={size} style={{ color }} {...rest}>
          {ICON_LIST[name] || <circle cx="28" cy="28" r="20" fill="currentColor"/>}
        </svg>
      );
    }

    function Button({ type = 'default', size = 'middle', loading, disabled, ghost, block, children, onClick, ...rest }) {
      const clsName = `ani-btn ani-btn-${type} ani-btn-${size} ${loading ? 'ani-btn-loading' : ''} ${block ? 'ani-btn-block' : ''}`;
      return (
        <button 
          className={clsName} 
          disabled={disabled || loading} 
          onClick={onClick} 
          style={ghost ? { background: 'transparent', boxShadow: 'none' } : undefined}
          {...rest}
        >
          {children}
        </button>
      );
    }

    function Input({ size = 'middle', shadow = false, prefix, suffix, status, value, onChange, placeholder, disabled, ...rest }) {
      const [focus, setFocus] = React.useState(false);
      const wrapperCls = `ani-input-wrapper ani-input-${size} ${shadow ? 'shadow-active' : ''} ${focus ? 'focus' : ''} ${status || ''} ${disabled ? 'disabled' : ''}`;
      return (
        <div className={wrapperCls}>
          {prefix && <span style={{ marginRight: 6 }}>{prefix}</span>}
          <input 
            type="text" 
            className="ani-input" 
            placeholder={placeholder}
            value={value} 
            onChange={onChange}
            disabled={disabled}
            onFocus={() => setFocus(true)}
            onBlur={() => setFocus(false)}
            {...rest}
          />
          {suffix && <span style={{ marginLeft: 6 }}>{suffix}</span>}
        </div>
      );
    }

    function Switch({ checked, onChange, checkedChildren, unCheckedChildren, size = 'default', disabled, ...rest }) {
      const isChecked = !!checked;
      const isSmall = size === 'small';
      const switchCls = `ani-switch ${isChecked ? 'ani-switch-checked' : ''} ${isSmall ? 'ani-switch-small' : ''} ${disabled ? 'disabled' : ''}`;
      
      const toggle = () => {
        if (disabled) return;
        onChange?.(!isChecked);
      };

      return (
        <div className={switchCls} onClick={toggle} tabIndex={disabled ? -1 : 0} {...rest}>
          <span style={{ 
            fontSize: isSmall ? 9 : 11, 
            fontWeight: 800, 
            color: '#fff', 
            paddingLeft: isChecked ? (isSmall ? 6 : 8) : (isSmall ? 20 : 28),
            paddingRight: isChecked ? (isSmall ? 20 : 28) : (isSmall ? 6 : 8),
            transition: 'all 0.25s'
          }}>
            {isChecked ? checkedChildren : unCheckedChildren}
          </span>
          <div className="ani-switch-handle"></div>
        </div>
      );
    }

    function Card({ pattern = 'none', color, type, hoverable = true, children, onClick, ...rest }) {
      let cls = `ani-card ${hoverable ? 'ani-card-hoverable' : ''}`;
      if (type === 'dashed') {
        cls += ' ani-card-dashed';
      } else if (pattern !== 'none') {
        cls += ` ani-card-pattern-${pattern}`;
      }
      return (
        <div className={cls} onClick={onClick} {...rest}>
          {children}
        </div>
      );
    }

    const TITLE_COLORS = {
      'default-green': ['#27d039', '#20992a', '#115017', '#fff'],
      'app-pink': ['#f8a6b2', '#e06880', '#a03060', '#fff'],
      'purple': ['#b77dee', '#9050d0', '#5a1a9a', '#fff'],
      'app-blue': ['#889df0', '#5068d8', '#2030a0', '#fff'],
      'app-yellow': ['#f7cd67', '#d4a030', '#8a6010', '#725d42'],
      'app-orange': ['#e59266', '#c06a30', '#7a3a10', '#fff'],
      'app-teal': ['#82d5bb', '#40a880', '#186048', '#fff'],
      'app-green': ['#8ac68a', '#509050', '#205020', '#fff'],
      'app-red': ['#fc736d', '#d43030', '#900010', '#fff'],
      'lime-green': ['#d1da49', '#90a010', '#485800', '#3d5a1a'],
      'yellow-green': ['#ecdf52', '#c0b010', '#706800', '#725d42'],
      'brown': ['#9a835a', '#705830', '#3a2810', '#fff'],
      'warm-peach-pink': ['#e18c6f', '#b85a30', '#6a2a10', '#fff']
    };

    function Title({ size = 'middle', color = 'default-green', children, ...rest }) {
      const scheme = TITLE_COLORS[color] || TITLE_COLORS['default-green'];
      const style = {
        '--rf': scheme[0],
        '--rb': scheme[1],
        '--rk': scheme[2],
        '--rt': scheme[3],
        fontSize: size === 'small' ? '14px' : size === 'large' ? '28px' : '20px'
      };

      return (
        <div className="ani-title-wrapper" style={style} {...rest}>
          <div className="ani-title-back ani-title-back-left"></div>
          <div className="ani-title-fold ani-title-fold-left"></div>
          <div className="ani-title-front"></div>
          <span className="ani-title-text">{children}</span>
          <div className="ani-title-fold ani-title-fold-right"></div>
          <div className="ani-title-back ani-title-back-right"></div>
        </div>
      );
    }

    function Tabs({ items = [], activeKey, onChange, ...rest }) {
      const [current, setCurrent] = React.useState(activeKey || items[0]?.key);
      const handleTabClick = (key) => {
        setCurrent(key);
        onChange?.(key);
      };
      const activeContent = items.find(item => item.key === current)?.children;

      return (
        <div className="ani-tabs" {...rest}>
          <div className="ani-tabs-list">
            {items.map(item => (
              <div 
                key={item.key} 
                className={`ani-tabs-item ${current === item.key ? 'ani-tabs-item-active' : ''}`}
                onClick={() => handleTabClick(item.key)}
              >
                {item.icon && <span style={{ marginRight: 6 }}>{item.icon}</span>}
                {item.label}
              </div>
            ))}
          </div>
          <div className="ani-tabs-content">
            {activeContent}
          </div>
        </div>
      );
    }

    function Collapse({ items = [], activeKey, onChange, ...rest }) {
      const [openKeys, setOpenKeys] = React.useState(activeKey ? [activeKey] : []);
      const toggle = (key) => {
        let nextKeys = [...openKeys];
        if (nextKeys.includes(key)) {
          nextKeys = nextKeys.filter(k => k !== key);
        } else {
          nextKeys.push(key);
        }
        setOpenKeys(nextKeys);
        onChange?.(nextKeys);
      };

      return (
        <div {...rest}>
          {items.map(item => {
            const isOpen = openKeys.includes(item.key);
            return (
              <div className="ani-collapse" key={item.key}>
                <div className="ani-collapse-header" onClick={() => toggle(item.key)}>
                  <span>{item.header}</span>
                  <div className="ani-collapse-icon" style={{ transform: isOpen ? 'rotate(180deg)' : 'none' }}>
                    {isOpen ? '−' : '+'}
                  </div>
                </div>
                <div className={`ani-collapse-content ${isOpen ? 'ani-collapse-content-open' : ''}`}>
                  <div className="ani-collapse-inner">
                    <div className="ani-collapse-body">
                      {item.children}
                    </div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    function Modal({ open, title, onCancel, onConfirm, footer, children, ...rest }) {
      if (!open) return null;
      return (
        <div className="ani-modal-overlay" onClick={onCancel}>
          <div className="ani-modal-container" onClick={e => e.stopPropagation()} {...rest}>
            {title && <div className="ani-modal-header">{title}</div>}
            <div className="ani-modal-body">{children}</div>
            <div className="ani-modal-footer">
              {footer !== undefined ? footer : (
                <>
                  <Button type="default" onClick={onCancel}>取消</Button>
                  <Button type="primary" onClick={onConfirm} style={{ background: '#ffcc00', borderColor: '#ffcc00', boxShadow: '0 5px 0 0 #e0b800' }}>确认</Button>
                </>
              )}
            </div>
          </div>
        </div>
      );
    }

    function Select({ options = [], value, onChange, placeholder = '请选择', ...rest }) {
      const [isOpen, setIsOpen] = React.useState(false);
      const selectedOption = options.find(opt => opt.value === value);
      
      return (
        <div className="ani-select-wrapper" {...rest}>
          <div className="ani-select-trigger" onClick={() => setIsOpen(!isOpen)}>
            <span>{selectedOption ? selectedOption.label : placeholder}</span>
            <span style={{ 
              transform: isOpen ? 'rotate(180deg)' : 'none', 
              transition: 'transform 0.25s',
              color: isOpen ? '#19c8b9' : '#a09080'
            }}>▼</span>
          </div>
          {isOpen && (
            <div className="ani-select-dropdown">
              {options.map(opt => (
                <div 
                  key={opt.value} 
                  className={`ani-select-option ${value === opt.value ? 'ani-select-option-selected' : ''}`}
                  onClick={() => {
                    onChange?.(opt.value);
                    setIsOpen(false);
                  }}
                >
                  {opt.label}
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    function Checkbox({ checked, onChange, children, ...rest }) {
      const isChecked = !!checked;
      return (
        <div 
          className={`ani-checkbox-container ${isChecked ? 'ani-checkbox-checked' : ''}`}
          onClick={() => onChange?.(!isChecked)}
          {...rest}
        >
          <div className="ani-checkbox-box">
            {isChecked && <span className="ani-checkbox-checkmark">✓</span>}
          </div>
          {children && <span>{children}</span>}
        </div>
      );
    }

    function Radio({ options = [], value, onChange, direction = 'horizontal', ...rest }) {
      return (
        <div style={{ display: 'flex', flexDirection: direction === 'vertical' ? 'column' : 'row', gap: direction === 'vertical' ? 8 : 16, flexWrap: 'wrap' }} {...rest}>
          {options.map(opt => {
            const isChecked = value === opt.value;
            return (
              <div 
                key={opt.value}
                className={`ani-radio-container ${isChecked ? 'ani-radio-checked' : ''}`}
                onClick={() => !opt.disabled && onChange?.(opt.value)}
                style={opt.disabled ? { opacity: 0.55, cursor: 'not-allowed' } : undefined}
              >
                <div className="ani-radio-box">
                  {isChecked && (
                    <svg className="ani-radio-checkmark" viewBox="0 0 16 16">
                      <path d="M2 8L6 12L14 4" />
                    </svg>
                  )}
                </div>
                <span>{opt.label}</span>
              </div>
            );
          })}
        </div>
      );
    }

    function Tooltip({ title, variant = 'default', children, ...rest }) {
      return (
        <div className="ani-tooltip-container" {...rest}>
          {children}
          <div className="ani-tooltip-box">
            {title}
          </div>
        </div>
      );
    }

    function Time() {

      }, []);

      const formatClock = (d) => {
        const hh = String(d.getHours()).padStart(2, '0');
        const mm = String(d.getMinutes()).padStart(2, '0');
        return `${hh}:${mm}`;
      };

      const daysZh = ["SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT"];
      
      return (
        <div className="ani-time">

            <div className="ani-time-day">{time.getMonth() + 1}月{time.getDate()}日</div>

          <div className="ani-time-clock">

    function Typewriter({ trigger, speed = 80, children }) {
      const [displayedText, setDisplayedText] = React.useState('');
      const fullText = typeof children === 'string' ? children : '';

      React.useEffect(() => {
        setDisplayedText('');
        let idx = 0;
        const timer = setInterval(() => {
          if (idx < fullText.length) {
            setDisplayedText(prev => prev + fullText.charAt(idx));
            idx++;
          } else {
            clearInterval(timer);
          }
        }, speed);
        return () => clearInterval(timer);
      }, [trigger, fullText, speed]);

      return <span>{displayedText}</span>;
    }

            {/* Footer tree line */}
            <footer style={{ marginTop: 'auto' }}>
              <Footer type="tree" />
              <div style={{ background: '#6fba2c', padding: '16px 20px', textAlign: 'center', color: '#fff9e3', fontSize: 12, fontWeight: 600 }}>
                © 2026 空腹虫饺子馆 & 林田球 ✦ Dorohedoro Fan Wiki. All rights reserved.
              </div>
            </footer>

            {/* Character detail Modal */}
            <Modal 
              open={!!selectedChar} 
              title={selectedChar?.name}
              onCancel={() => setSelectedChar(null)}
              onConfirm={() => setSelectedChar(null)}
            >
              {selectedChar && (
                <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                  <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
                    <span style={{ background: '#e6f9f6', color: '#19c8b9', padding: '4px 10px', borderRadius: 20, fontSize: 11, fontWeight: 700 }}>
                      魔法强度: {selectedChar.level}
                    </span>
                    <span style={{ background: '#fdf1ea', color: '#e59266', padding: '4px 10px', borderRadius: 20, fontSize: 11, fontWeight: 700 }}>
                      面具: {selectedChar.mask}
                    </span>
                  </div>
                  
                  <div style={{ background: '#fff', border: '2.5px solid #e8dcc8', borderRadius: 16, padding: 14, minHeight: 70 }}>
                    <div style={{ fontSize: 12, color: '#a0936e', fontWeight: 800, marginBottom: 4 }}>🦎 嘴里那个男人的口供：</div>
                    <p style={{ fontSize: 14, fontWeight: 800, color: '#794f27', fontStyle: 'italic' }}>
                      “<Typewriter trigger={caymanSpeakTrigger} speed={60}>你，不是我诅咒的那个人……</Typewriter>”
                    </p>
                  </div>

                  <p style={{ fontSize: 13, lineHeight: 1.6, color: '#725d42' }}>
                    {selectedChar.desc}
                  </p>
                  
                  <CodeBlock>
                    {`// 异兽魔都魔法状态机数据
struct MagicSource {
    let user = "${selectedChar.name}"
    let magicType = "${selectedChar.magic}"
    let maskType = "${selectedChar.mask}"
}`}
                  </CodeBlock>
                </div>
              )}
            </Modal>

            {/* Gyoza Ordered Confirmation Modal */}
            <Modal
              open={showGyozaModal}
              title="🥟 饺子制作完成！"
              onCancel={() => setShowGyozaModal(false)}
              onConfirm={() => setShowGyozaModal(false)}
            >
              <div style={{ textAlign: 'center', padding: '10px 0' }}>
                <div style={{ fontSize: 48, marginBottom: 12 }}>🥟😋</div>
                <h4 style={{ fontSize: 16, fontWeight: 900, color: '#794f27', marginBottom: 8 }}>
                  “真好吃！二阶堂的饺子是世界上最棒的！”
                </h4>
                <p style={{ fontSize: 13, lineHeight: 1.6, color: '#725d42' }}>
                  二阶堂已经在铁板上为您煎好了 6 个外焦里嫩的招牌饺子。您的金币扣除了 200 🥟。
                </p>
              </div>
            </Modal>

            {/* Mask Alert Modal */}
            <Modal
              open={doubleClickAlert}
              title="☠️ 触发面具诅咒"
              onCancel={() => setDoubleClickAlert(false)}
              onConfirm={() => setDoubleClickAlert(false)}
            >
              <div style={{ textAlign: 'center', padding: '10px 0' }}>
                <div style={{ fontSize: 48, marginBottom: 12 }}>😷😈</div>
                <p style={{ fontSize: 13, lineHeight: 1.6, color: '#725d42' }}>
                  你双击了恶魔面具的启动程序，空气中的魔法粉尘浓度正在剧烈上升！
                </p>
              </div>
            </Modal>

          </div>
        </Cursor>
      );
    }

    // ==========================================
    // 3) MOUNT & RENDER
    // ==========================================
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

  </script>
</body>
</html>
